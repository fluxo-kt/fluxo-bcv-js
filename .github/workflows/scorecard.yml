name: Scorecard supply-chain security

# Runs OSSF Scorecard analysis weekly and on push to main. Publishes
# SARIF to GitHub Code Scanning so the report is visible in the
# Security tab.
#
# Branch-Protection check requires admin-scope GH API access — the
# action's `repo_token` input is wired with `SCORECARD_PAT ||
# GITHUB_TOKEN` fallback (see step below), so adding the
# `SCORECARD_PAT` repo secret (a fine-grained PAT with `read_org`
# scope on this org's `fluxo-bcv-js` repo) activates the check at the
# next run with NO workflow edit. Until then, GITHUB_TOKEN is used and
# the Branch-Protection check returns "?"; all other checks
# (Dangerous-Workflow, Token-Permissions, Pinned-Dependencies,
# Code-Review, Maintained, SAST, etc.) are PAT-free and provide the
# bulk of the score.

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [ main ]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Needed to upload the SARIF results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # `read_org`-scoped PAT unlocks the Branch-Protection check;
          # without it scorecard falls back to GITHUB_TOKEN (which
          # cannot read branch-protection rules) and the check returns
          # "?". The OR-fallback expression means adding the
          # SCORECARD_PAT repo secret at ANY future point activates the
          # check automatically — no workflow edit, no re-deploy. Until
          # then, the rest of the score (Dangerous-Workflow,
          # Token-Permissions, Pinned-Dependencies, Code-Review,
          # Maintained, SAST, …) is unaffected.
          repo_token: ${{ secrets.SCORECARD_PAT || secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: results.sarif

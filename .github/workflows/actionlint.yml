name: Validate Workflows

on:
  push:
    branches: [ main, dev ]
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Covers natively: `:latest` Docker tag detection, shellcheck-style
      # step-script validation, unknown-action lookups, expression syntax.
      # Replaces ad-hoc bash gates that would have to re-implement each.
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error

      # actionlint does NOT enforce that every workflow declares a
      # `permissions:` block — without one, jobs inherit the repo-wide
      # default (which can be unexpectedly broad, especially after a
      # GitHub-side default change). Make the requirement explicit so a
      # future workflow that forgets the block fails PR review, not in
      # production after an incident.
      #
      # Uses `yq` (preinstalled on ubuntu-latest) to STRUCTURALLY parse
      # the YAML — a regex grep on `^[[:space:]]*permissions:` would
      # false-positive on a `run: |` heredoc that contains the literal
      # text `permissions:` at column 0 of the embedded script. The yq
      # approach reads the actual YAML tree: a workflow qualifies if
      # EITHER `.permissions` exists at the top level OR every entry in
      # `.jobs[]` has its own `.permissions` (job-level overrides are
      # equally valid per GitHub's least-privilege model).
      - name: Every workflow declares permissions
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -e "$f" ] || continue
            has_top=$(yq 'has("permissions")' "$f")
            all_jobs=$(yq '[.jobs[] | has("permissions")] | all' "$f")
            if [ "$has_top" != "true" ] && [ "$all_jobs" != "true" ]; then
              echo "::error file=$f::workflow has no \`permissions:\` block at top level OR on every job; declare it explicitly (least-privilege)"
              missing=1
            fi
          done
          exit "$missing"

name: Clear cache

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    steps:
      # Lock egress to the GitHub API only — this workflow does NOT
      # need any other network reach (no Maven, no Sigstore, no
      # external endpoints). `block` mode rejects anything else with
      # an audit log line, making accidental data exfil via a
      # compromised github-script payload impossible.
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - name: Clear cache
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        continue-on-error: true
        with:
          script: |
            console.log("About to clear all GitHub Actions caches")
            const owner = context.repo.owner
            const repo = context.repo.repo
            const caches = await github.rest.actions.getActionsCacheList({
              owner: owner,
              repo: repo,
            })
            for (const cache of caches.data.actions_caches) {
              await github.rest.actions.deleteActionsCacheById({
                owner: owner,
                repo: repo,
                cache_id: cache.id,
              })
              console.log(`cleaned cache "${cache.key}"`)
            }
            console.log("Clear completed")

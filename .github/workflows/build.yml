name: Build

on:
  pull_request:
    paths-ignore:
      - '**.*ignore'
      - '**.md'
      - '**.txt'
      - '**/pr-**.yml'
      - '**/release.yml'
      - '**dependabot.yml'
    # Avoid useless and/or duplicate runs.
    # Also, we merge with --ff-only,
    # so we don't need to run on the merge commit.
    branches-ignore:
      # Dependabot creates both branch and PR. Avoid running twice.
      - 'dependabot/**'
      - 'dev'
      - 'feat*/**'
      - 'fix/**'
      - 'mr/**'
      - 'pr/**'
      - 'pull/**'
      - 'wip/**'
  push:
    paths-ignore:
      - '**.*ignore'
      - '**.md'
      - '**.txt'
      - '**/pr-**.yml'
      - '**/release.yml'
      - '**dependabot.yml'

permissions:
  contents: write
  # required for all workflows (CodeQL)
  security-events: write
  # required for workflows in private repositories (CodeQL)
  actions: read
  # We appear to need write permission for both pull-requests and
  # issues to post a comment to a pull request.
  pull-requests: write
  issues: write

env:
  CI: true
  BUILD_NUMBER: ${{ github.run_number }}
  SCM_TAG: ${{ github.sha }}
  #GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  DEPENDENCY_GRAPH_INCLUDE_CONFIGURATIONS: "^(?!(classpath)).*"
  DEPENDENCY_GRAPH_INCLUDE_PROJECTS: "^:(?!(buildSrc|test|check)).*"
  IS_DEFAULT_BRANCH: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

jobs:
  buildAndCheck:
    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]
        os: [ 'macos', 'ubuntu', 'windows' ]
        language: [ 'java-kotlin' ]

    name: 'Build and check on ${{ matrix.os }}'
    timeout-minutes: 25
    runs-on: '${{ matrix.os }}-latest'
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    env:
      GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify wrapper-pin alignment
        # Each composite check pins Gradle deliberately for matrix coverage:
        # root/checks/latest pick the build-side ceiling; checks/js-only
        # holds the floor. Future commits that bump or add a check module
        # MUST update this gate in lockstep so drift is detected at PR time
        # — not after a baseline run silently regenerates against the wrong
        # version.
        shell: bash
        run: |
          expect() {  # $1=path  $2=expected-version-regex
            local pin
            pin=$(grep '^distributionUrl' "$1/gradle/wrapper/gradle-wrapper.properties")
            echo "$pin" | grep -qE "gradle-$2-" || {
              echo "::error file=$1/gradle/wrapper/gradle-wrapper.properties::wrapper drifted (expected $2): $pin"
              exit 1
            }
          }
          expect .                  '9\.5\.1'
          expect checks/latest      '9\.5\.1'
          expect checks/kgp-only    '9\.5\.1'
          expect checks/dual        '9\.5\.1'
          expect checks/middle      '8\.14\.5'
          expect checks/js-only     '8\.6'

      - name: 'Set up JDK ${{ matrix.java }}'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '${{ matrix.java }}'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          # Folded-in from the deleted gradle-wrapper-validation.yml.
          validate-wrappers: true
          gradle-home-cache-cleanup: true
          cache-disabled: ${{ matrix.os == 'windows' }} # super slow on Windows.
          cache-encryption-key: "${{ secrets.GRADLE_ENCRYPTION_KEY }}"
          cache-read-only: ${{ !env.IS_DEFAULT_BRANCH }}
          dependency-graph: ${{ env.IS_DEFAULT_BRANCH && 'generate-and-submit' || 'disabled'}}
          add-job-summary-as-pr-comment: on-failure
          artifact-retention-days: 1

      - name: Initialize CodeQL
        if: matrix.os == 'ubuntu'
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ matrix.language }}

      - name: 'Build and check plugin itself'
        timeout-minutes: 15
        run: ./gradlew build assemble check --continue --stacktrace --scan

      - name: Upload sarif report (Detekt)
        if: always() && (github.event_name == 'pull_request' || env.IS_DEFAULT_BRANCH)
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        continue-on-error: true
        with:
          sarif_file: build/detekt-merged.sarif
          category: detekt

      - name: Upload sarif report (Lint)
        if: always() && (github.event_name == 'pull_request' || env.IS_DEFAULT_BRANCH)
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        continue-on-error: true
        with:
          sarif_file: build/lint-merged.sarif
          category: lint

      - name: Run check-latest
        if: always()
        timeout-minutes: 10
        working-directory: checks/latest
        run: ./gradlew check --continue --stacktrace --scan
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: Run check-js-only
        if: always()
        timeout-minutes: 10
        working-directory: checks/js-only
        run: ./gradlew check --continue --stacktrace --scan
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: Run check-middle
        if: always()
        timeout-minutes: 10
        working-directory: checks/middle
        # Matrix-interior smoke: Kotlin 2.2.21 + BCV 0.16.3 + Gradle
        # 8.14.5. Catches drift between the floor (`checks/js-only`)
        # and the ceiling (`checks/latest`) — in particular the BCV
        # 0.14→0.16 worker-isolation boundary and the Kotlin 2.0→2.4
        # metadata rename. Without this cell, regressions only
        # surface on the ceiling and bisects span multiple commits.
        run: ./gradlew check --continue --stacktrace --scan
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: Run check-kgp-only
        if: always()
        timeout-minutes: 10
        working-directory: checks/kgp-only
        # Embedded-only smoke: KGP `abiValidation { }` activated, no
        # external BCV plugin. Validates the new dual-mode trigger
        # (commit 21), the task-based detection shim (commit 20), and
        # `DirConfig.TARGET_DIR` short-circuit (commit 23). Also runs
        # `checkKotlinAbi` so KGP's KLIB ABI baseline is verified in
        # the same matrix invocation.
        run: ./gradlew check checkKotlinAbi --continue --stacktrace --scan
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: Run check-dual (path-selection sweep)
        if: always() && matrix.os == 'ubuntu'
        timeout-minutes: 12
        working-directory: checks/dual
        # Both external BCV AND KGP-embedded `abiValidation` applied —
        # the migration-window cell. Sweeps `preferEmbedded={auto,true,
        # false}` and asserts the lifecycle observable's contract:
        #   AUTO    → trigger=external + migrate-to-embedded recommendation
        #   true    → trigger=embedded (no recommendation)
        #   false   → trigger=external (no recommendation)
        # The baseline `.d.ts` byte content is identical across all
        # three (path is observable, output isn't) — that property is
        # preserved implicitly by all three runs passing apiCheck
        # against the same committed baselines.
        shell: bash
        run: |
          set -euo pipefail
          assert_observable() {  # $1=invocation args  $2=expected trigger  $3=expected preferEmbedded label
            local out
            out=$(./gradlew apiCheck $1 --rerun-tasks 2>&1)
            echo "$out" | grep -q "trigger=$2 preferEmbedded=$3" \
              || { echo "::error::missing/wrong lifecycle observable for $1 (expected trigger=$2 preferEmbedded=$3)"; echo "$out"; exit 1; }
          }
          assert_observable "" external auto
          assert_observable "-PpreferEmbedded=true"  embedded true
          assert_observable "-PpreferEmbedded=false" external false
        env:
          GITHUB_DEPENDENCY_GRAPH_ENABLED: false

      - name: Upload the build report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: '${{ matrix.os }}-build-report'
          path: |
            **/build/logs/
            **/build/reports/
            **/build/output/
            build/*-merged.*
          compression-level: 9

      - name: Perform CodeQL Analysis
        if: matrix.os == 'ubuntu'
        timeout-minutes: 6
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: "/language:${{matrix.language}}"

      - name: "Post result in PR comment"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: github.event_name == 'pull_request' && failure()
        env:
          OS: ${{ matrix.os }}
          GH_WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { OS, GH_WORKFLOW, RUN_URL } = process.env
            github.rest.issues.createComment({
              issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo,
              body: `❌ ${GH_WORKFLOW} [failed](${RUN_URL}) on ${OS}.`,
            })

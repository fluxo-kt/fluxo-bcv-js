name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  # allows the action to create a release
  contents: write

env:
  CI: true
  RELEASE: true
  DISABLE_TESTS: true
  BUILD_NUMBER: ${{ github.run_number }}
  SCM_TAG: ${{ github.sha }}
  GRADLE_OPTS: |
    -Dorg.gradle.daemon=false
    -Dorg.gradle.unsafe.watch-fs=false
    -Dorg.gradle.vfs.watch=false

jobs:
  gh_release:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare release settings
        run: |
          echo "GITHUB_REF_NAME: $GITHUB_REF_NAME"
          RELEASE_PRE=false
          RELEASE_SUFFIX=""
          # Check release type
          if [[ "$GITHUB_REF_NAME" =~ 'alpha' || "$GITHUB_REF_NAME" =~ 'beta' || "$GITHUB_REF_NAME" =~ 'rc' ]]; then
            echo "This is a pre-release!"
            RELEASE_PRE=true
            RELEASE_SUFFIX=" (pre release)"
          fi
          # shellcheck disable=SC2086
          echo "RELEASE_PRE=$RELEASE_PRE" >> $GITHUB_ENV
          # shellcheck disable=SC2086
          echo "RELEASE_SUFFIX=$RELEASE_SUFFIX" >> $GITHUB_ENV

      - name: GitHub Release
        # https://github.com/anton-yurchenko/git-release#readme
        # Pinned by digest (v6.0.0) — `:latest` is an immutable tag in
        # Docker Hub semantics but the underlying SHA is rewriteable.
        # Pinning to the digest prevents silent supply-chain rewrites
        # and Dependabot can still propose digest bumps.
        uses: docker://antonyurchenko/git-release@sha256:b3a7d6a87981f8ed455e6b44c702e55afd95b3e628c324d7fd4f6f85728f792b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRAFT_RELEASE: "true"
          PRE_RELEASE: "${{ env.RELEASE_PRE }}"
          RELEASE_NAME_SUFFIX: "${{ env.RELEASE_SUFFIX }}"
          CHANGELOG_FILE: "CHANGELOG.md"
          ALLOW_EMPTY_CHANGELOG: "false"

  publish_release:
    runs-on: macos-latest

    # Sigstore keyless signing relies on the workflow's GitHub OIDC
    # identity. Without `id-token: write`, `sigstoreSign*Publication`
    # cannot mint an OIDC token to exchange for a Fulcio cert, and the
    # bundle production silently degrades to no-op (or hard-fails,
    # depending on `dev.sigstore.sign` v2.x behaviour). `contents: read`
    # is the minimum needed for checkout. No GitHub writes from this
    # job — release notes/tags are owned by `gh_release`.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true
          cache-read-only: true

      - name: Publish plugin
        if: always() && github.repository == 'fluxo-kt/fluxo-bcv-js'
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          RELEASE: true
        run: >
          ./gradlew publishPlugins
          --no-build-cache --no-configuration-cache --stacktrace --scan
          -Pgradle.publish.key="${{ secrets.GRADLE_PUBLISH_KEY }}"
          -Pgradle.publish.secret="${{ secrets.GRADLE_PUBLISH_SECRET }}"

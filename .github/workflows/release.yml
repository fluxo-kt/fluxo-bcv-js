name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  # allows the action to create a release
  contents: write

env:
  CI: true
  RELEASE: true
  DISABLE_TESTS: true
  BUILD_NUMBER: ${{ github.run_number }}
  SCM_TAG: ${{ github.sha }}
  GRADLE_OPTS: |
    -Dorg.gradle.daemon=false
    -Dorg.gradle.unsafe.watch-fs=false
    -Dorg.gradle.vfs.watch=false

jobs:
  gh_release:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare release settings
        run: |
          echo "GITHUB_REF_NAME: $GITHUB_REF_NAME"
          RELEASE_PRE=false
          RELEASE_SUFFIX=""
          # Check release type
          if [[ "$GITHUB_REF_NAME" =~ 'alpha' || "$GITHUB_REF_NAME" =~ 'beta' || "$GITHUB_REF_NAME" =~ 'rc' ]]; then
            echo "This is a pre-release!"
            RELEASE_PRE=true
            RELEASE_SUFFIX=" (pre release)"
          fi
          # shellcheck disable=SC2086
          echo "RELEASE_PRE=$RELEASE_PRE" >> $GITHUB_ENV
          # shellcheck disable=SC2086
          echo "RELEASE_SUFFIX=$RELEASE_SUFFIX" >> $GITHUB_ENV

      - name: GitHub Release
        # https://github.com/anton-yurchenko/git-release#readme
        # Pinned by digest (v6.0.0) — `:latest` is an immutable tag in
        # Docker Hub semantics but the underlying SHA is rewriteable.
        # Pinning to the digest prevents silent supply-chain rewrites
        # and Dependabot can still propose digest bumps.
        uses: docker://antonyurchenko/git-release@sha256:b3a7d6a87981f8ed455e6b44c702e55afd95b3e628c324d7fd4f6f85728f792b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRAFT_RELEASE: "true"
          PRE_RELEASE: "${{ env.RELEASE_PRE }}"
          RELEASE_NAME_SUFFIX: "${{ env.RELEASE_SUFFIX }}"
          CHANGELOG_FILE: "CHANGELOG.md"
          ALLOW_EMPTY_CHANGELOG: "false"

  publish_release:
    needs: gh_release
    runs-on: macos-latest

    # Sigstore keyless signing relies on the workflow's GitHub OIDC
    # identity. Without `id-token: write`, `sigstoreSign*Publication`
    # cannot mint an OIDC token to exchange for a Fulcio cert, and the
    # bundle production silently degrades to no-op (or hard-fails,
    # depending on `dev.sigstore.sign` v2.x behaviour). `contents: write`
    # is needed for `gh release upload` (attaching `.sigstore.bundle`
    # files to the draft release created by `gh_release`); release
    # NOTES / tags / draft-creation themselves are still owned by
    # `gh_release`.
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true
          cache-read-only: true

      # Idempotency probe: Plugin Portal rejects duplicate-version
      # uploads with HTTP 4xx, which fails `publishPlugins`. To make
      # release.yml safely re-runnable against an already-published
      # tag (e.g. when a downstream step like Sigstore-bundle attach
      # fails and the tag needs to be re-pushed), probe the Portal
      # for the marker POM at this version. If present, skip
      # `publishPlugins` but still run sigstoreSign + attach — those
      # tasks run as dependencies of `publishPlugins` via the build
      # script, so we invoke them directly via `:plugin:assemble +
      # sigstoreSign*Publication` in the alternate run path below.
      - name: Probe Plugin Portal for existing version
        id: portal_probe
        if: github.repository == 'fluxo-kt/fluxo-bcv-js'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Plugin-marker POM is the canonical "is this version
          # published" probe — Plugin Portal resolves `plugins { id }`
          # through this artefact.
          URL="https://plugins.gradle.org/m2/io/github/fluxo-kt/binary-compatibility-validator-js/io.github.fluxo-kt.binary-compatibility-validator-js.gradle.plugin/${VERSION}/io.github.fluxo-kt.binary-compatibility-validator-js.gradle.plugin-${VERSION}.pom"
          echo "Probing: $URL"
          if curl -fsSL --retry 3 --max-time 30 -o /dev/null "$URL"; then
            echo "::notice::Plugin Portal already has v${VERSION}; skipping publishPlugins, still running Sigstore signing+attach."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish plugin
        if: steps.portal_probe.outputs.already_published != 'true' && github.repository == 'fluxo-kt/fluxo-bcv-js'
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          RELEASE: true
        run: >
          ./gradlew publishPlugins
          --no-build-cache --no-configuration-cache --stacktrace --scan
          -Pgradle.publish.key="${{ secrets.GRADLE_PUBLISH_KEY }}"
          -Pgradle.publish.secret="${{ secrets.GRADLE_PUBLISH_SECRET }}"

      # When `publishPlugins` is skipped (probe-hit), its
      # `sigstoreSign*` deps don't fire transitively. Run them
      # explicitly so re-tags produce valid bundles. OIDC identity is
      # still `release.yml@refs/tags/v*` (same workflow path & ref),
      # so consumer cosign-verify regex stays unchanged.
      - name: Sign artefacts (when publish was skipped)
        if: steps.portal_probe.outputs.already_published == 'true' && github.repository == 'fluxo-kt/fluxo-bcv-js'
        env:
          RELEASE: true
        run: >
          ./gradlew :plugin:sigstoreSignPluginMavenPublication
          :plugin:sigstoreSignFluxo-bcv-tsPluginMarkerMavenPublication
          --no-build-cache --no-configuration-cache --stacktrace --scan

      # Attach Sigstore bundles to the draft GitHub Release so
      # consumers can `cosign verify-blob --bundle …` against the
      # canonical distribution point. Plugin Portal (the
      # `com.gradle.plugin-publish` task) does NOT upload artefact
      # siblings, and Maven Central is also bundle-blind — without
      # this step, consumers without rekor-cli must reconstruct
      # verification from Rekor by JAR-SHA correlation.
      # Runs only on the canonical repo (fork pushes can't mint
      # OIDC tokens, so no bundles would exist).
      - name: Attach Sigstore bundles to GitHub Release
        if: always() && github.repository == 'fluxo-kt/fluxo-bcv-js'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # bash 3.2 compatibility: macos-latest's `/bin/bash` is
          # Apple-shipped 3.2 (predates bash 4.0's `mapfile`/
          # `readarray`). The `while IFS= read -r -d ''` idiom works
          # on bash 3.0+ — process substitution + NUL-delimited read
          # is space-, newline-, and unicode-safe.
          # File-extension union covers sigstore-java versions:
          # v2.x writes `.sigstore.json` (current); v1.x wrote
          # `.sigstore.bundle`; v0.x wrote bare `.sigstore`. The
          # union future-proofs against extension flips and was the
          # root cause of v1.1.0 release attempt #2's failure
          # (find restricted to `.sigstore.bundle` while
          # `dev.sigstore.sign 2.0.x` produces `.sigstore.json`).
          bundles=()
          while IFS= read -r -d '' file; do
            bundles+=("$file")
          done < <(
            find . -type f \
              \( -name '*.sigstore.json' \
                 -o -name '*.sigstore.bundle' \
                 -o -name '*.sigstore' \) -print0
          )
          if [ ${#bundles[@]} -eq 0 ]; then
            echo "::error::No Sigstore bundle files produced — wiring regressed (check :plugin:tasks --group sigstore signing)"
            exit 1
          fi
          echo "Uploading ${#bundles[@]} Sigstore bundle(s) to release $GITHUB_REF_NAME:"
          printf '  %s\n' "${bundles[@]}"
          # `--clobber` overwrites on re-run (e.g. tag-retry); strictly
          # safer than letting upload fail.
          gh release upload "$GITHUB_REF_NAME" --clobber "${bundles[@]}"
